<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>邻声 — 陌生人社交 App 原型</title>
  <style>
    :root {
      --bg: oklch(97% 0.012 80);
      --fg: oklch(20% 0.02 60);
      --muted: oklch(48% 0.015 60);
      --border: oklch(89% 0.012 80);
      --accent: oklch(58% 0.16 35);
      --font-display: 'Iowan Old Style', 'Charter', Georgia, serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      padding: 48px 24px 80px;
    }
    .masthead {
      max-width: 1200px;
      margin: 0 auto 48px;
      text-align: center;
    }
    .masthead h1 {
      font-family: var(--font-display);
      font-size: clamp(32px, 4vw, 48px);
      letter-spacing: -0.02em;
      margin: 0 0 12px;
    }
    .masthead p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }
    .masthead .meta {
      margin-top: 16px;
      font-family: ui-monospace, Menlo, monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .gallery {
      max-width: 1300px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(390px, 1fr));
      gap: 40px 32px;
      justify-items: center;
    }
    .frame-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .frame-label {
      font-family: ui-monospace, Menlo, monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .frame-label strong {
      color: var(--fg);
      font-weight: 500;
    }
    iframe {
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <div class="masthead">
    <h1>邻声</h1>
    <p>基于兴趣的附近社交 · 高保真 iPhone 原型</p>
    <div class="meta">Editorial · Monocle Magazine Direction</div>
  </div>

  <div class="gallery">
    <div class="frame-wrap">
      <div class="frame-label"><strong>01</strong> · 发现 Nearby</div>
      <iframe src="assets/frames/iphone-15-pro.html?screen=../../screens/01-discover.html" width="390" height="844" loading="lazy"></iframe>
    </div>
    <div class="frame-wrap">
      <div class="frame-label"><strong>02</strong> · 匹配 Match</div>
      <iframe src="assets/frames/iphone-15-pro.html?screen=../../screens/02-match.html" width="390" height="844" loading="lazy"></iframe>
    </div>
    <div class="frame-wrap">
      <div class="frame-label"><strong>03</strong> · 消息 Messages</div>
      <iframe src="assets/frames/iphone-15-pro.html?screen=../../screens/03-chat-list.html" width="390" height="844" loading="lazy"></iframe>
    </div>
    <div class="frame-wrap">
      <div class="frame-label"><strong>04</strong> · 聊天 Chat</div>
      <iframe src="assets/frames/iphone-15-pro.html?screen=../../screens/04-chat-detail.html" width="390" height="844" loading="lazy"></iframe>
    </div>
    <div class="frame-wrap">
      <div class="frame-label"><strong>05</strong> · 我的 Profile</div>
      <iframe src="assets/frames/iphone-15-pro.html?screen=../../screens/05-profile.html" width="390" height="844" loading="lazy"></iframe>
    </div>
    <div class="frame-wrap">
      <div class="frame-label"><strong>06</strong> · 编辑 Edit</div>
      <iframe src="assets/frames/iphone-15-pro.html?screen=../../screens/06-profile-edit.html" width="390" height="844" loading="lazy"></iframe>
    </div>
  </div>
</body>
</html>
