<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />

  <title>我的 — 邻声</title>
  <link rel="stylesheet" href="../assets/screens.css" />
  <style>
    .lightbox-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .lightbox-overlay.active {
      display: flex;
      opacity: 1;
    }
    .lightbox-img {
      max-width: 92vw;
      max-height: 82vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      transform: scale(0.92);
      transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    .lightbox-overlay.active .lightbox-img {
      transform: scale(1);
    }
    .lightbox-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      font-size: 22px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.25); }
    .lightbox-caption {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      letter-spacing: 0.02em;
    }
    .photo-grid img { cursor: pointer; }
  </style>
</head>
<body>
  <main class="content" data-od-id="content">
    <section class="pad" style="padding-top: 12px;" data-od-id="head">
      <div class="row" style="gap: 16px;">
        <img class="avatar" style="width: 64px; height: 64px;" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=200&amp;h=200&amp;fit=crop&amp;crop=face" alt="周牧" />
        <div>
          <h1 class="h2" style="margin: 0;">周牧</h1>
          <p class="meta" style="margin: 4px 0 0;">产品设计师 · 上海徐汇 · 加入 2024</p>
        </div>
      </div>
      <div class="row" style="margin-top: 14px; gap: 8px;">
        <a href="./06-profile-edit.html" class="btn-secondary" style="flex: 1; min-height: 38px; font-size: 13px; text-decoration: none;">编辑资料</a>
        <button class="btn-secondary" style="flex: 1; min-height: 38px; font-size: 13px;">分享主页</button>
      </div>
    </section>

    <section class="pad" data-od-id="stats" style="margin-top: 18px;">
      <div class="grid-3">
        <div class="card flat" style="text-align: center;">
          <div class="num" style="font-size: 22px; letter-spacing: -0.02em;">128</div>
          <div class="meta">关注</div>
        </div>
        <div class="card flat" style="text-align: center;">
          <div class="num" style="font-size: 22px; letter-spacing: -0.02em;">3.2k</div>
          <div class="meta">粉丝</div>
        </div>
        <div class="card flat" style="text-align: center;">
          <div class="num" style="font-size: 22px; letter-spacing: -0.02em;">892</div>
          <div class="meta">获赞</div>
        </div>
      </div>
    </section>

    <section class="pad" data-od-id="bio" style="margin-top: 4px;">
      <p style="margin: 0; font-size: 14px; line-height: 1.6; color: var(--fg);">
        喜欢胶片摄影、城市骑行和精品咖啡。周末常在法租界一带活动，正在学习手冲。如果你也对这些感兴趣，欢迎来聊。
      </p>
      <div class="row" style="margin-top: 12px; flex-wrap: wrap; gap: 6px;">
        <span class="pill">胶片摄影</span>
        <span class="tag">城市骑行</span>
        <span class="tag">手冲咖啡</span>
        <span class="tag">黑胶</span>

    </section>

    <section class="pad" data-od-id="photos" style="margin-top: 18px;">
      <p class="meta" style="margin: 0 0 10px;">照片</p>
      <div class="photo-grid">
        <img class="ph-img" style="border-radius: 0;" src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=300&amp;h=300&amp;fit=crop" alt="照片" onclick="openLightbox(this.src, 0)" />
        <img class="ph-img" style="border-radius: 0;" src="https://images.unsplash.com/photo-1541625602330-2277a4c46182?w=300&amp;h=300&amp;fit=crop" alt="照片" onclick="openLightbox(this.src, 1)" />
        <img class="ph-img" style="border-radius: 0;" src="https://images.unsplash.com/photo-1603048588665-791ca8aea617?w=300&amp;h=300&amp;fit=crop" alt="照片" onclick="openLightbox(this.src, 2)" />
        <img class="ph-img" style="border-radius: 0;" src="https://images.unsplash.com/photo-1447933601403-0c6688de566e?w=300&amp;h=300&amp;fit=crop" alt="照片" onclick="openLightbox(this.src, 3)" />
        <img class="ph-img" style="border-radius: 0;" src="https://images.unsplash.com/photo-1514565131-fce0801e5785?w=300&amp;h=300&amp;fit=crop" alt="照片" onclick="openLightbox(this.src, 4)" />
        <img class="ph-img" style="border-radius: 0;" src="https://images.unsplash.com/photo-1452780212940-6f5c0d14d848?w=300&amp;h=300&amp;fit=crop" alt="照片" onclick="openLightbox(this.src, 5)" />
      </div>
    </section>
  </main>

  <nav class="tabbar" style="--tabs: 4;" data-od-id="tabbar">

      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>

    <a class="tab active" href="./05-profile.html">

      我的

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox-overlay" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="closeLightboxBtn(event)" aria-label="关闭">&times;</button>
    <img id="lightbox-img" class="lightbox-img" src="" alt="大图" />
    <div class="lightbox-caption"><span id="lightbox-index"></span> / 6</div>
  </div>

  <script>
    const photoUrls = [
      'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=800&h=800&fit=crop',
      'https://images.unsplash.com/photo-1541625602330-2277a4c46182?w=800&h=800&fit=crop',
      'https://images.unsplash.com/photo-1603048588665-791ca8aea617?w=800&h=800&fit=crop',
      'https://images.unsplash.com/photo-1447933601403-0c6688de566e?w=800&h=800&fit=crop',
      'https://images.unsplash.com/photo-1514565131-fce0801e5785?w=800&h=800&fit=crop',
      'https://images.unsplash.com/photo-1452780212940-6f5c0d14d848?w=800&h=800&fit=crop'
    ];
    let currentIndex = 0;

    function openLightbox(src, index) {
      currentIndex = index;
      const lb = document.getElementById('lightbox');
      const img = document.getElementById('lightbox-img');
      const idx = document.getElementById('lightbox-index');
      img.src = photoUrls[index];
      idx.textContent = index + 1;
      lb.style.display = 'flex';
      requestAnimationFrame(() => lb.classList.add('active'));
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox(e) {
      if (e.target === e.currentTarget) doClose();
    }
    function closeLightboxBtn(e) {
      e.stopPropagation();
      doClose();
    }
    function doClose() {
      const lb = document.getElementById('lightbox');
      lb.classList.remove('active');
      setTimeout(() => { lb.style.display = 'none'; document.body.style.overflow = ''; }, 250);
    }
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') doClose();
      if (!document.getElementById('lightbox').classList.contains('active')) return;
      if (e.key === 'ArrowRight') { if (currentIndex < photoUrls.length - 1) openLightbox('', currentIndex + 1); }
      else if (e.key === 'ArrowLeft') { if (currentIndex > 0) openLightbox('', currentIndex - 1); }
    });
  </script>
</body>
</html>
